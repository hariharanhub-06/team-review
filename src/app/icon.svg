<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="hhBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#hhBg)"/>

  <!-- gear teeth -->
  <g fill="#ffffff" opacity="0.85">
    <g>
      <rect x="29.4" y="4.5" width="5.2" height="7.5" rx="1.4"/>
      <rect x="29.4" y="4.5" width="5.2" height="7.5" rx="1.4" transform="rotate(45 32 32)"/>
      <rect x="29.4" y="4.5" width="5.2" height="7.5" rx="1.4" transform="rotate(90 32 32)"/>
      <rect x="29.4" y="4.5" width="5.2" height="7.5" rx="1.4" transform="rotate(135 32 32)"/>
      <rect x="29.4" y="4.5" width="5.2" height="7.5" rx="1.4" transform="rotate(180 32 32)"/>
      <rect x="29.4" y="4.5" width="5.2" height="7.5" rx="1.4" transform="rotate(225 32 32)"/>
      <rect x="29.4" y="4.5" width="5.2" height="7.5" rx="1.4" transform="rotate(270 32 32)"/>
      <rect x="29.4" y="4.5" width="5.2" height="7.5" rx="1.4" transform="rotate(315 32 32)"/>
    </g>
  </g>

  <!-- gear ring -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#ffffff" stroke-width="2.6" opacity="0.9"/>

  <!-- HH monogram -->
  <g fill="#ffffff">
    <rect x="19.5" y="24" width="3.3" height="16" rx="0.6"/>
    <rect x="27.2" y="24" width="3.3" height="16" rx="0.6"/>
    <rect x="19.5" y="30.4" width="11" height="3.2"/>

    <rect x="33.5" y="24" width="3.3" height="16" rx="0.6"/>
    <rect x="41.2" y="24" width="3.3" height="16" rx="0.6"/>
    <rect x="33.5" y="30.4" width="11" height="3.2"/>
  </g>
</svg>
